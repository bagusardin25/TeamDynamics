<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur stdDeviation="4" result="blur" />
    <feComponentTransfer in="blur" result="glow">
      <feFuncA type="linear" slope="0.5" />
    </feComponentTransfer>
    <feMerge>
      <feMergeNode in="glow" />
      <feMergeNode in="SourceGraphic" />
    </feMerge>
  </filter>

  <g filter="url(#glow)">
    <path d="M 15 25 L 55 25 M 35 25 L 35 85" stroke="#c4b5fd" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 35 25 C 90 25, 90 85, 35 85" stroke="#8b5cf6" stroke-width="14" stroke-linecap="round" />
  </g>
</svg>
