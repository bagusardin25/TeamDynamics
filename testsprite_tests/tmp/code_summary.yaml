version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js 16
  - React 19
  - Tailwind CSS 4
  - shadcn/ui
  - Framer Motion
  - Recharts
  - Sonner
  - WebSocket
  - FastAPI backend
  - SQLite database
routes:
  - path: /
    file: src/app/page.tsx
    auth_required: false
    description: Interactive landing page with pressure slider, CTA buttons, and theme toggle
  - path: /login
    file: src/app/login/page.tsx
    auth_required: false
    description: Email/password login page with optional Google OAuth
  - path: /register
    file: src/app/register/page.tsx
    auth_required: false
    description: Account registration page with name, email, and password fields
  - path: /dashboard
    file: src/app/dashboard/page.tsx
    auth_required: true
    description: Authenticated dashboard showing simulation history, stats, credits, and logout
  - path: /setup
    file: src/app/setup/page.tsx
    auth_required: false
    description: Simulation setup wizard for company details, crisis selection, agent roster, and launch
  - path: /simulation
    file: src/app/simulation/page.tsx
    auth_required: false
    description: Live simulation view driven by WebSocket updates, agent chat, metrics, and interventions
  - path: /report
    file: src/app/report/page.tsx
    auth_required: false
    description: Post-simulation report page with executive summary, charts, recommendations, and PDF export
  - path: /share/[id]
    file: src/app/share/[id]/page.tsx
    auth_required: false
    description: Public shared report page for a specific simulation id with PDF export
  - path: /docs
    file: src/app/docs/page.tsx
    auth_required: false
    description: Documentation page explaining the simulation system, APIs, and architecture
features:
  - name: Landing Experience
    description: Browse the marketing homepage, move the pressure slider, toggle theme, and navigate to docs or simulation setup
    files:
      - src/app/page.tsx
    entry_route: /
    user_interactions:
      - Drag the pressure slider left and right
      - Watch the hero copy and styling react to pressure changes
      - Toggle light and dark theme
      - Click Start Simulation to go to setup
      - Click View Interactive Demo Report to open the report page
      - Click Docs in the navbar
    api_calls: []
    auth_required: false
  - name: Registration
    description: Create a new user account and reach the dashboard on success
    files:
      - src/app/register/page.tsx
      - src/contexts/auth-context.tsx
    entry_route: /register
    user_interactions:
      - Fill full name
      - Fill email
      - Fill password
      - Submit the form
      - See inline validation for short passwords or backend errors
    api_calls:
      - method: POST
        endpoint: /api/auth/register
    auth_required: false
  - name: Login
    description: Sign in with email/password, or use Google OAuth if configured
    files:
      - src/app/login/page.tsx
      - src/contexts/auth-context.tsx
    entry_route: /login
    user_interactions:
      - Enter email and password
      - Toggle password visibility
      - Submit the login form
      - Click the Google sign-in flow when configured
      - See errors for invalid credentials or missing OAuth config
    api_calls:
      - method: POST
        endpoint: /api/auth/login
      - method: POST
        endpoint: /api/auth/google
    auth_required: false
  - name: Dashboard
    description: Authenticated overview with simulation counts, credits, and history cards
    files:
      - src/app/dashboard/page.tsx
    entry_route: /dashboard
    user_interactions:
      - View simulation statistics
      - Toggle theme
      - Start a new simulation from the setup button
      - Open a simulation from the history list
      - Log out
    api_calls:
      - method: GET
        endpoint: /api/auth/me/simulations
    auth_required: true
  - name: Simulation Setup
    description: Configure a company, choose agents, analyze documents, and launch a new simulation
    files:
      - src/app/setup/page.tsx
      - src/components/ui/radar-chart.tsx
    entry_route: /setup
    user_interactions:
      - Edit company name and culture
      - Select preset agents or create a custom agent
      - Adjust personality sliders and roster size
      - Generate a custom crisis
      - Upload a document for analysis
      - Adjust simulation duration and pacing
      - Launch the simulation
    api_calls:
      - method: GET
        endpoint: /api/agents/presets
      - method: POST
        endpoint: /api/simulation/generate-crisis
      - method: POST
        endpoint: /api/document/analyze
      - method: POST
        endpoint: /api/simulation/create
    auth_required: false
  - name: Live Simulation
    description: Real-time simulation view that listens to WebSocket updates and lets the user send interventions
    files:
      - src/app/simulation/page.tsx
      - src/hooks/use-simulation-socket.ts
      - src/components/simulation/SimulationNavbar.tsx
      - src/components/simulation/MessageFeed.tsx
    entry_route: /simulation
    user_interactions:
      - Watch agent messages stream in live
      - Inspect metrics and agent state
      - Trigger interventions from the control panel
      - Exit to dashboard or go to the report when complete
    api_calls:
      - method: GET
        endpoint: /api/simulation/{id}/status
      - method: POST
        endpoint: /api/simulation/{id}/intervene
    auth_required: false
  - name: Report View
    description: Read the post-simulation analysis, charts, agent summaries, recommendations, and export to PDF
    files:
      - src/app/report/page.tsx
    entry_route: /report
    user_interactions:
      - View executive summary and critical findings
      - Review timeline charts and key metrics
      - Inspect agent performance cards
      - Read AI recommendations
      - Export the report as a PDF
    api_calls:
      - method: GET
        endpoint: /api/simulation/{id}/report
    auth_required: false
  - name: Shared Report
    description: Public shareable report page for a simulation id with the same analytics and export flow
    files:
      - src/app/share/[id]/page.tsx
    entry_route: /share/[id]
    user_interactions:
      - Open a shared report by simulation id
      - Review the same analysis sections as the report page
      - Export the shared report as a PDF
    api_calls:
      - method: GET
        endpoint: /api/simulation/{id}/report
    auth_required: false
  - name: Docs
    description: Browse the product documentation and API reference
    files:
      - src/app/docs/page.tsx
    entry_route: /docs
    user_interactions:
      - Navigate through documentation sections
      - Copy code snippets
      - Read API and architecture documentation
    api_calls: []
    auth_required: false
known_limitations:
  - issue: Google OAuth login depends on NEXT_PUBLIC_GOOGLE_CLIENT_ID
    location: src/app/login/page.tsx
    impact: Google sign-in shows an error if the env var is missing
  - issue: Simulation setup is accessible without authentication
    location: src/app/setup/page.tsx
    impact: Users can configure simulations before logging in, but dashboard access still requires auth
  - issue: Simulation and report pages depend on backend availability
    location: src/hooks/use-simulation-socket.ts and src/app/report/page.tsx
    impact: WebSocket simulation and report fetching fail if the FastAPI backend is not running
